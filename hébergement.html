<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Touristiques - Mairie de Ouidah</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/footer.css">
  <link rel="stylesheet" href="./css/navbar.css">
    <link rel="stylesheet" href="./css/hébergement.css">
</head>

<body>
    <!-- Header -->
    <div id="header"></div>

    <!-- Section1 -->
    <section class="services-banner d-flex align-items-center justify-content-center position-relative">
        <div class="container text-center" style="z-index: 1;">
            <div class="d-flex justify-content-center align-items-center mb-3 services-title-wrapper">
                <h1 class="text-white display-4 mb-0 me-md-5">Hébergement ou transport ?</h1>
                <a href="#">
                    <i class="bi bi-search services-search-icon"></i>
                </a>
            </div>
            <img src="./img/Line-services.svg" alt="séparateur" class="services-line mt-3">
        </div>

      
        <div class="hero-wave">
            <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
                <path d="M0,0 C360,120 1080,120 1440,0 L1440,120 L0,120 Z"></path>
            </svg>
        </div>
    </section>  

    <!-- Hébergement Section -->
    <section class="hebergement-section">
    <div class="container">

        <div class="hebergement-wrapper">
        <div class="category-header">
            <button class="category-badge">Catégorie Hébergement</button>
        </div>

        <div class="hotels-grid">
            <div class="hotel-card">
                <img src="./img/hotel-casa-del-papa.svg" alt="Casa del Papa">
                <div class="hotel-overlay">
                    <h3>HOTEL</h3>
                    <h2>CASA DEL PAPA</h2>
                </div>
            </div>

            <div class="hotel-card">
                <img src="./img/hotel-djegba.svg" alt="Djegba">
                <div class="hotel-overlay">
                    <h3>HOTEL</h3>
                    <h2>DJEGBA</h2>
                </div>
            </div>

            <div class="hotel-card">
                <img src="./img/hotel-terra-nostra.svg" alt="Terra Nostra">
                <div class="hotel-overlay">
                    <h3>HOTEL</h3>
                    <h2>TERRA NOSTRA</h2>
                </div>
            </div>

            <div class="hotel-card">
                <img src="./img/hotel-mariella.svg" alt="Mariella">
                <div class="hotel-overlay">
                    <h3>HOTEL</h3>
                    <h2>MARIELLA</h2>
                </div>
            </div>

            <div class="hotel-card">
                <img src="./img/hotel-le-dauphin.svg" alt="Le Dauphin">
                <div class="hotel-overlay">
                    <h3>HOTEL</h3>
                    <h2>LE DAUPHIN</h2>
                </div>
            </div>

            <div class="hotel-card">
                <img src="./img/hotel-casa-del-papa-2.svg" alt="Casa del Papa">
                <div class="hotel-overlay">
                    <h3>HOTEL</h3>
                    <h2>CASA DEL PAPA</h2>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination-container">
            <a href="#" class="pagination-arrow"><i class="bi bi-chevron-left"></i></a>
            <a href="#" class="pagination-number active">1</a>
            <a href="#" class="pagination-number">2</a>
            <a href="#" class="pagination-number">3</a>
            <a href="#" class="pagination-number">4</a>
            <a href="#" class="pagination-number">5</a>
            <span class="pagination-dots">...</span>
            <a href="#" class="pagination-number">18</a>
            <a href="#" class="pagination-arrow"><i class="bi bi-chevron-right"></i></a>
        </div>
        </div>

        <div class="category-header mt-5">
            <button class="category-badge">Catégorie Transport</button>
        </div>
    </div>
    </section>


    <!-- Footer -->
  <div id="footer"></div>

  <script src="./js/include.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous">
  </script>
  
</body>
</html>
