<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event - Mairie de Ouidah</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/footer.css">
  <link rel="stylesheet" href="./css/navbar.css">
  <link rel="stylesheet" href="./css/services.css">
  <link rel="stylesheet" href="./css/event.css">
</head>

<body>
    <!-- Header -->
    <div id="header"></div>

    <!-- Section Galerie Photos -->
    <section class="photo-gallery py-5">
        <div class="container">
            <!-- Titre et Description -->
            <div class="gallery-header mb-5">
                <h1 class="gallery-title">
                    <span class="title-normal">LES PLUS BELLES</span>
                    <span class="title-normal">PHOTOS DE LA VILLE DE</span>
                    <span class="title-highlight">OUIDAH</span>
                </h1>
                <p class="gallery-description">Parcourez notre galerie de photo et découvrez ici ce que notre ville a à offrir.</p>
            </div>

            <!-- Galerie Images -->
            <div class="gallery-grid">

                <div class="gallery-item image1">
                    <img src="./img/gallery-1.svg" alt="">
                </div>

                <div class="gallery-item image2">
                    <img src="./img/gallery-2.svg" alt="">
                </div>

                <div class="gallery-item image3">
                    <img src="./img/gallery-3.svg" alt="">
                </div>

                <div class="gallery-item image4">
                    <img src="./img/gallery-4.svg" alt="">
                </div>

                <div class="gallery-item image5">
                    <img src="./img/gallery-5.svg" alt="">
                </div>

                <div class="gallery-item image6">
                    <img src="./img/gallery-6.svg" alt="">
                </div>

                <div class="gallery-item image7">
                    <img src="./img/gallery-7.svg" alt="">
                </div>

                <div class="gallery-item image8">
                    <img src="./img/gallery-8.svg" alt="">
                </div>

            </div>
        </div>
    </section>

    <!-- Section Catégories -->
    <section class="categories-section py-5">
        <div class="container">
            <h2 class="categories-title text-center mb-5">Explorez plus de catégories</h2>

            <div class="row g-4">
                <!-- Catégorie 1 -->
                <div class="col-lg-4 col-md-6">
                    <div class="category-card">
                        <img src="./img/categorie-mairie.svg" alt="Visite de la Mairie" class="img-fluid rounded">
                        <div class="category-overlay">
                            <p class="category-text">Visite de la Mairie de Paris</p>
                        </div>
                    </div>
                </div>

                <!-- Catégorie 2 -->
                <div class="col-lg-4 col-md-6">
                    <div class="category-card">
                        <img src="./img/categorie-vue.svg" alt="Vue sur Ouidah" class="img-fluid rounded">
                        <div class="category-overlay">
                            <p class="category-text">Vue sur Ouidah</p>
                        </div>
                    </div>
                </div>

                <!-- Catégorie 3 -->
                <div class="col-lg-4 col-md-6">
                    <div class="category-card">
                        <img src="./img/categorie-histoire.svg" alt="Histoire de Ouidah" class="img-fluid rounded">
                        <div class="category-overlay">
                            <p class="category-text">Histoire de Ouidah</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer"></div>
   



  <script src="./js/include.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous">
  </script>
  
</body>
</html>
