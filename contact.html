<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services Détails - Mairie de Ouidah</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/footer.css">
  <link rel="stylesheet" href="./css/navbar.css">
  <link rel="stylesheet" href="./css/contact.css">
</head>

<body>
    <!-- Header -->
    <div id="header"></div>

  <!-- Contact Section -->
<section class="contact-section">
  <div class="contact-container">
    <h1 class="contact-title text-uppercase">CONTACTEZ NOUS</h1>
    <p class="contact-subtitle text-uppercase">Vous avez une question ou une réclamation ? Envoyez nous un message !</p>

    
    <div class="contact-card">
      <div class="contact-content">
        <!-- Contact Information -->
        <div class="contact-info">
          <h2 class="info-title">Informations sur le contact</h2>
          
          <div class="info-item">
            <i class="bi bi-telephone"></i>
            <span>+229 21341365</span>
          </div>

          <div class="info-item">
            <i class="bi bi-envelope"></i>
            <span>mairieOuidah@gouv.bj</span>
          </div>

          <div class="info-item">
            <i class="bi bi-geo-alt"></i>
            <span>93+F-FQV, Rue de Palmistes, Ouidah</span>
          </div>

          <div class="social-links">
            <a href="#" class="social-icon twitter"><i class="bi bi-twitter"></i></a>
            <a href="#" class="social-icon facebook"><i class="bi bi-facebook"></i></a>
            <a href="#" class="social-icon instagram"><i class="bi bi-instagram"></i></a>
            <img src="./img/demi-disque.svg" alt="Demi-disque décoratif" class="demi-disque-img">
            <img src="./img/disque.svg" alt="" class="disque-img">
          </div>
        </div>

        <!-- Contact Form -->
        <div class="contact-form">
          <form>
            <div class="form-row">
              <div class="form-group">
                <label for="nom">Nom</label>
                <input type="text" id="nom" name="nom" placeholder="Nom">
              </div>
              <div class="form-group">
                <label for="prenom">Prénom</label>
                <input type="text" id="prenom" name="prenom" placeholder="Prénom">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email">
              </div>
              <div class="form-group">
                <label for="telephone">Numéro de téléphone</label>
                <input type="tel" id="telephone" name="telephone" placeholder="+229 00 00 00 00">
              </div>
            </div>

            <div class="form-group full-width">
              <label for="message">Message</label>
              <textarea id="message" name="message" placeholder="Rédigez votre message ..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Envoyer un message</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>


  <!-- Map Section -->
  <div class="map-container">
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3962.5987569287357!2d1.9435!3d6.3654!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2sMairie%20de%20Ouidah!5e0!3m2!1sfr!2sbj!4v1234567890" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
  </div>

  <!-- Footer -->
    <div id="footer"></div>

  <script src="./js/include.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous">
  </script>
  
</body>
</html>
