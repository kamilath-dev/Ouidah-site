<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histoire Ouidah - Mairie de Ouidah</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/footer.css">
  <link rel="stylesheet" href="./css/navbar.css">
    <link rel="stylesheet" href="./css/galerie.css">
</head>

<body>
    <!-- Header -->
    <div id="header"></div>

     <!-- Section1 -->
    <section class="services-banner d-flex align-items-center justify-content-center position-relative">
        <div class="container text-center" style="z-index: 1;">
            <h1 class="text-white display-4 fw-bold mb-0 text-uppercase">Visite de  la maire de Paris</h1>
        </div>

      
        <div class="hero-wave">
            <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
                <path d="M0,0 C360,120 1080,120 1440,0 L1440,120 L0,120 Z"></path>
            </svg>
        </div>
    </section>

    <!-- Section 2  -->
    <section class="gallery-section py-5">
        <div class="container">
            <div class="regular-gallery-grid">

                <div class="gallery-item-regular">
                    <img src="./img/gallery-1.svg" alt="Galerie 1" class="img-fluid">
                </div>
                <div class="gallery-item-regular">
                    <img src="./img/gallery-2.svg" alt="Galerie 2" class="img-fluid">
                </div>
                <div class="gallery-item-regular">
                    <img src="./img/gallery-3.svg" alt="Galerie 3" class="img-fluid">
                </div>
                <div class="gallery-item-regular">
                    <img src="./img/gallery-4.svg" alt="Galerie 4" class="img-fluid">
                </div>

               
                <div class="gallery-item-regular">
                    <img src="./img/gallery-5.svg" alt="Galerie 5" class="img-fluid">
                </div>
                <div class="gallery-item-regular">
                    <img src="./img/gallery-6.svg" alt="Galerie 6" class="img-fluid">
                </div>
                <div class="gallery-item-regular">
                    <img src="./img/gallery-7.svg" alt="Galerie 7" class="img-fluid">
                </div>
                <div class="gallery-item-regular">
                    <img src="./img/gallery-8.svg" alt="Galerie 8" class="img-fluid">
                </div>

                
                <div class="gallery-item-regular">
                    <img src="./img/gallery-1.svg" alt="Galerie 9" class="img-fluid">
                </div>
                <div class="gallery-item-regular">
                    <img src="./img/gallery-2.svg" alt="Galerie 10" class="img-fluid">
                </div>
                <div class="gallery-item-regular">
                    <img src="./img/gallery-3.svg" alt="Galerie 11" class="img-fluid">
                </div>
                <div class="gallery-item-regular">
                    <img src="./img/gallery-4.svg" alt="Galerie 12" class="img-fluid">
                </div>

                
                <div class="gallery-item-regular">
                    <img src="./img/gallery-5.svg" alt="Galerie 13" class="img-fluid">
                </div>
                <div class="gallery-item-regular">
                    <img src="./img/gallery-6.svg" alt="Galerie 14" class="img-fluid">
                </div>
                <div class="gallery-item-regular">
                    <img src="./img/gallery-7.svg" alt="Galerie 15" class="img-fluid">
                </div>
                <div class="gallery-item-regular">
                    <img src="./img/gallery-8.svg" alt="Galerie 16" class="img-fluid">
                </div>
            </div>

           
            <div class="pagination-container">
                <button class="pagination-arrow"><i class="bi bi-chevron-left"></i></button>
                <button class="pagination-btn active">1</button>
                <button class="pagination-btn">2</button>
                <button class="pagination-btn">3</button>
                <button class="pagination-btn">4</button>
                <button class="pagination-btn">5</button>
                <span class="pagination-dots">...</span>
                <button class="pagination-btn">18</button>
                <button class="pagination-arrow"><i class="bi bi-chevron-right"></i></button>
            </div>
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div id="lightboxModal" class="lightbox-overlay">
        <div class="lightbox-container">
            <!-- Fermer -->
            <button class="lightbox-close" id="lightboxClose">&times;</button>

            <!-- Navigation gauche -->
            <button class="lightbox-nav-arrow lightbox-prev" id="lightboxPrev">
                <i class="bi bi-chevron-left"></i>
            </button>

            <!-- Contenu principal -->
            <div class="lightbox-content">
                <!-- Image principale -->
                <div class="lightbox-main">
                    <img id="lightboxMainImage" src="" alt="Image principale" class="img-fluid">
                </div>

                <!-- Images latérales -->
                <div class="lightbox-sides">
                    <div class="lightbox-side-item">
                        <img id="lightboxSideLeft" src="" alt="Image gauche" class="img-fluid">
                    </div>
                    <div class="lightbox-side-item">
                        <img id="lightboxSideRight" src="" alt="Image droite" class="img-fluid">
                    </div>
                </div>
            </div>

            <!-- Navigation droite -->
            <button class="lightbox-nav-arrow lightbox-next" id="lightboxNext">
                <i class="bi bi-chevron-right"></i>
            </button>

            <!-- Thumbnails en bas -->
            <div class="lightbox-thumbnails" id="lightboxThumbnails">
                <!-- Les thumbnails seront générés par JavaScript -->
            </div>
        </div>
    </div>
  
    <!-- Footer -->
    <div id="footer"></div>

  <script src="./js/include.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous">
  </script>

  <!-- Lightbox Script -->
  <script>
    const galleryItems = document.querySelectorAll('.gallery-item-regular img');
    const lightboxModal = document.getElementById('lightboxModal');
    const lightboxMainImage = document.getElementById('lightboxMainImage');
    const lightboxSideLeft = document.getElementById('lightboxSideLeft');
    const lightboxSideRight = document.getElementById('lightboxSideRight');
    const lightboxThumbnails = document.getElementById('lightboxThumbnails');
    const lightboxClose = document.getElementById('lightboxClose');
    const lightboxPrev = document.getElementById('lightboxPrev');
    const lightboxNext = document.getElementById('lightboxNext');

    let currentIndex = 0;
    let images = [];

    // Récupérer toutes les images
    function initGallery() {
      images = Array.from(galleryItems).map(img => img.src);
      
      // Ajouter des images répétées pour la pagination infinie
      for (let i = 0; i < 18; i++) {
        images.push(images[i % galleryItems.length]);
      }

      // Créer les thumbnails
      createThumbnails();
    }

    // Créer les thumbnails
    function createThumbnails() {
      lightboxThumbnails.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        const idx = (currentIndex + i) % images.length;
        const thumb = document.createElement('img');
        thumb.src = images[idx];
        thumb.alt = `Thumbnail ${i}`;
        thumb.className = 'lightbox-thumbnail';
        thumb.onclick = () => {
          currentIndex = idx;
          updateLightbox();
        };
        lightboxThumbnails.appendChild(thumb);
      }
    }

    // Mettre à jour l'affichage du lightbox
    function updateLightbox() {
      const prevIdx = (currentIndex - 1 + images.length) % images.length;
      const nextIdx = (currentIndex + 1) % images.length;

      lightboxMainImage.src = images[currentIndex];
      lightboxSideLeft.src = images[prevIdx];
      lightboxSideRight.src = images[nextIdx];

      createThumbnails();
    }

    // Événements de clic sur les images de la galerie
    galleryItems.forEach((img, index) => {
      img.addEventListener('click', () => {
        currentIndex = index;
        lightboxModal.style.display = 'flex';
        updateLightbox();
        document.body.style.overflow = 'hidden';
      });
    });

    // Fermer le lightbox
    lightboxClose.addEventListener('click', () => {
      lightboxModal.style.display = 'none';
      document.body.style.overflow = 'auto';
    });

    // Cliquer en dehors du contenu pour fermer
    lightboxModal.addEventListener('click', (e) => {
      if (e.target === lightboxModal) {
        lightboxModal.style.display = 'none';
        document.body.style.overflow = 'auto';
      }
    });

    // Navigation précédent
    lightboxPrev.addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      updateLightbox();
    });

    // Navigation suivant
    lightboxNext.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateLightbox();
    });

    // Navigation au clavier
    document.addEventListener('keydown', (e) => {
      if (lightboxModal.style.display === 'flex') {
        if (e.key === 'ArrowLeft') lightboxPrev.click();
        if (e.key === 'ArrowRight') lightboxNext.click();
        if (e.key === 'Escape') lightboxClose.click();
      }
    });

    // Initialiser
    initGallery();
  </script>
  
</body>
</html>
